<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档详情 - 知识处理服务</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">
    <div class="min-h-screen">
        <!-- 顶部导航 -->
        <nav class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto px-4 py-4">
                <div class="flex items-center justify-between">
                    <h1 class="text-2xl font-bold text-gray-800">AI 知识处理服务</h1>
                    <div class="space-x-4 text-sm">
                        <a href="/static/index.html" class="text-gray-600 hover:text-blue-600">首页</a>
                        <a href="/static/upload.html" class="text-gray-600 hover:text-blue-600">上传文档</a>
                        <a href="/static/list.html" class="text-blue-600 font-medium">文档列表</a>
                        <a href="/static/generate.html" class="text-gray-600 hover:text-blue-600">AI 出题</a>
                        <a href="/static/recommend-admin.html" class="text-gray-600 hover:text-blue-600">题目审核</a>
                        <a href="/static/practice.html" class="text-gray-600 hover:text-blue-600">模拟答题</a>
                        <a href="/static/tags.html" class="text-gray-600 hover:text-blue-600" style="display:none">标签管理</a>
                        <a href="/docs" class="text-gray-600 hover:text-blue-600">API 文档</a>
                    </div>
                </div>
            </div>
        </nav>

        <!-- 主内容区 -->
        <div class="max-w-6xl mx-auto px-4 py-8">
            <!-- 返回按钮 -->
            <div class="mb-4">
                <a href="/static/list.html" class="inline-flex items-center text-blue-600 hover:text-blue-700">
                    ← 返回列表
                </a>
            </div>

            <!-- 加载提示 -->
            <div id="loading" class="bg-white rounded-lg shadow-sm p-8 text-center">
                <div
                    class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent">
                </div>
                <p class="mt-2 text-gray-600">加载中...</p>
            </div>

            <!-- 文档详情 -->
            <div id="documentDetail" class="hidden">
                <!-- 基本信息卡片 -->
                <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                    <div class="flex items-start justify-between mb-4">
                        <h2 id="docTitle" class="text-2xl font-bold text-gray-800"></h2>
                        <div id="statusBadge"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-6 text-sm">
                        <div class="space-y-3">
                            <div><span class="font-medium text-gray-700">文档 ID:</span> <span id="docId"
                                    class="text-gray-600"></span></div>
                            <div><span class="font-medium text-gray-700">一级标签:</span> <span id="docType"
                                    class="text-gray-600"></span></div>
                            <div><span class="font-medium text-gray-700">二级标签:</span> <span id="businessDomain"
                                    class="text-gray-600"></span></div>
                            <div><span class="font-medium text-gray-700">组织维度:</span> <span id="orgDimension"
                                    class="text-gray-600"></span></div>
                            <div><span class="font-medium text-gray-700">版本号:</span> <span id="version"
                                    class="text-gray-600"></span></div>
                            <div><span class="font-medium text-gray-700">生效日期:</span> <span id="effectiveDate"
                                    class="text-gray-600"></span></div>
                        </div>
                        <div class="space-y-3">
                            <div><span class="font-medium text-gray-700">文件格式:</span> <span id="fileFormat"
                                    class="text-gray-600"></span></div>
                            <div><span class="font-medium text-gray-700">文件大小:</span> <span id="fileSize"
                                    class="text-gray-600"></span></div>
                            <div><span class="font-medium text-gray-700">文件哈希:</span> <span id="fileHash"
                                    class="text-gray-600 text-xs"></span></div>
                            <div><span class="font-medium text-gray-700">安全等级:</span> <span id="securityLevel"
                                    class="text-gray-600"></span></div>
                            <div><span class="font-medium text-gray-700">上传用户:</span> <span id="uploadUser"
                                    class="text-gray-600"></span></div>
                            <div><span class="font-medium text-gray-700">上传时间:</span> <span id="uploadTime"
                                    class="text-gray-600"></span></div>
                        </div>
                    </div>

                    <div class="mt-4 pt-4 border-t text-xs text-gray-500">
                        <div class="flex justify-between">
                            <span>创建时间: <span id="createdAt"></span></span>
                            <span>更新时间: <span id="updatedAt"></span></span>
                        </div>
                    </div>

                    <!-- 成功通知（重新解析成功后显示） -->
                    <div id="successContainer" class="mt-4 hidden">
                        <div class="p-3 bg-green-50 border border-green-200 rounded flex items-center space-x-2">
                            <span class="text-green-600">✅</span>
                            <p class="text-sm font-medium text-green-800">解析成功，文档已完成处理</p>
                        </div>
                    </div>

                    <!-- 错误信息 -->
                    <div id="errorContainer" class="mt-4 hidden">
                        <div class="p-3 bg-red-50 border border-red-200 rounded">
                            <p class="text-sm font-medium text-red-800">错误信息:</p>
                            <p id="errorMessage" class="text-sm text-red-700 mt-1"></p>
                        </div>
                    </div>

                    <!-- 操作按钮 -->
                    <div id="actionButtons" class="mt-6 flex space-x-3">
                        <button onclick="reparseDocument()" id="reparseBtn"
                            class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:bg-gray-400">
                            🔄 重新解析
                        </button>
                        <button onclick="toggleEditForm()" id="editBtn"
                            class="px-4 py-2 bg-gray-600 text-white rounded-md hover:bg-gray-700">
                            ✏️ 编辑信息
                        </button>
                        <button onclick="deleteDocument()" id="deleteBtn"
                            class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700">
                            🗑️ 删除文档
                        </button>
                    </div>

                    <!-- 内联编辑表单 -->
                    <div id="editForm" class="mt-6 hidden border-t pt-6">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4">编辑文档信息</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">文档名称</label>
                                <input type="text" id="editDocName"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">一级标签</label>
                                <input type="text" id="editDocType"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm"
                                    placeholder="教材/大纲/试卷/课件">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">二级标签</label>
                                <input type="text" id="editBusinessDomain"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">组织维度</label>
                                <input type="text" id="editOrgDimension"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">版本号</label>
                                <input type="text" id="editVersion"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">安全等级</label>
                                <select id="editSecurityLevel"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm">
                                    <option value="public">公开</option>
                                    <option value="internal">内部</option>
                                    <option value="confidential">机密</option>
                                </select>
                            </div>
                        </div>
                        <div class="mt-4 flex space-x-3">
                            <button onclick="submitEdit()"
                                class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 text-sm">
                                保存修改
                            </button>
                            <button onclick="toggleEditForm()"
                                class="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 text-sm">
                                取消
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 知识点列表 -->
                <div class="bg-white rounded-lg shadow-md p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-xl font-semibold text-gray-800">知识点列表</h3>
                        <button onclick="loadKnowledgePoints()"
                            class="px-3 py-1 text-sm bg-gray-100 hover:bg-gray-200 rounded-md">
                            🔄 刷新
                        </button>
                    </div>

                    <div id="knowledgeLoading" class="text-center py-8 hidden">
                        <div
                            class="inline-block animate-spin rounded-full h-6 w-6 border-4 border-blue-600 border-t-transparent">
                        </div>
                        <p class="mt-2 text-sm text-gray-600">加载知识点...</p>
                    </div>

                    <div id="knowledgeList" class="space-y-4">
                        <!-- 动态加载 -->
                    </div>

                    <div id="knowledgeEmpty" class="text-center py-8 text-gray-500 hidden">
                        暂无知识点
                    </div>
                </div>
            </div>

            <!-- 错误提示 -->
            <div id="errorState" class="bg-white rounded-lg shadow-sm p-8 text-center hidden">
                <p class="text-red-600 text-lg">❌ 加载失败</p>
                <p id="errorText" class="text-gray-600 mt-2"></p>
                <a href="/static/list.html"
                    class="mt-4 inline-block px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
                    返回列表
                </a>
            </div>
        </div>
    </div>

    <script>
        let currentDocId = null;

        async function loadDocument() {
            const params = new URLSearchParams(window.location.search);
            currentDocId = params.get('id');

            if (!currentDocId) {
                showError('缺少文档 ID 参数');
                return;
            }

            try {
                const response = await fetch(`/api/v1/documents/${currentDocId}`);
                if (!response.ok) {
                    throw new Error('文档不存在或已被删除');
                }

                const doc = await response.json();
                displayDocument(doc);
                loadKnowledgePoints();
            } catch (error) {
                showError(error.message);
            }
        }

        function displayDocument(doc) {
            currentDoc = doc;
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('documentDetail').classList.remove('hidden');

            document.getElementById('docTitle').textContent = doc.doc_name;
            document.getElementById('docId').textContent = doc.id;
            document.getElementById('docType').textContent = doc.doc_type || '-';
            document.getElementById('businessDomain').textContent = doc.business_domain || '-';
            document.getElementById('orgDimension').textContent = doc.org_dimension || '-';
            document.getElementById('version').textContent = doc.version || '-';
            document.getElementById('effectiveDate').textContent = doc.effective_date || '-';
            document.getElementById('fileFormat').textContent = doc.file_format?.toUpperCase() || '-';
            document.getElementById('fileSize').textContent = formatFileSize(doc.file_size);
            document.getElementById('fileHash').textContent = doc.file_hash || '-';
            document.getElementById('securityLevel').textContent = doc.security_level || '-';
            document.getElementById('uploadUser').textContent = doc.upload_user || '-';
            document.getElementById('uploadTime').textContent = formatDateTime(doc.upload_time);
            document.getElementById('createdAt').textContent = formatDateTime(doc.created_at);
            document.getElementById('updatedAt').textContent = formatDateTime(doc.updated_at);

            document.getElementById('statusBadge').innerHTML = getStatusBadge(doc.status);

            if (doc.error_message && doc.status !== 'completed') {
                // 有错误且当前不是已完成状态，显示错误信息
                document.getElementById('errorContainer').classList.remove('hidden');
                document.getElementById('errorMessage').textContent = doc.error_message;
            } else if (doc.status === 'completed' && sessionStorage.getItem(`reparse_${doc.id}`)) {
                // 本次会话中触发过重新解析且已完成，显示成功通知
                document.getElementById('successContainer').classList.remove('hidden');
                sessionStorage.removeItem(`reparse_${doc.id}`);
            }

            // 根据状态禁用重新解析按钮
            const reparseBtn = document.getElementById('reparseBtn');
            if (doc.status === 'parsing') {
                reparseBtn.disabled = true;
                reparseBtn.textContent = '⏳ 解析中...';
            }
        }

        async function loadKnowledgePoints() {
            const loading = document.getElementById('knowledgeLoading');
            const list = document.getElementById('knowledgeList');
            const empty = document.getElementById('knowledgeEmpty');

            loading.classList.remove('hidden');
            list.innerHTML = '';
            empty.classList.add('hidden');

            try {
                const response = await fetch(`/api/v1/knowledge-points/by-document/${currentDocId}`);
                if (!response.ok) throw new Error('加载知识点失败');

                const data = await response.json();
                displayKnowledgePoints(data.items);
            } catch (error) {
                list.innerHTML = `<div class="text-red-600 text-sm">❌ ${error.message}</div>`;
            } finally {
                loading.classList.add('hidden');
            }
        }

        function displayKnowledgePoints(points) {
            const list = document.getElementById('knowledgeList');
            const empty = document.getElementById('knowledgeEmpty');

            if (points.length === 0) {
                empty.classList.remove('hidden');
                return;
            }

            list.innerHTML = points.map((kp, index) => `
                <div class="border border-gray-200 rounded-lg p-4 hover:shadow-sm transition-shadow">
                    <div class="flex items-start justify-between mb-2">
                        <h4 class="font-semibold text-gray-800">
                            ${index + 1}. ${escapeHtml(kp.title)}
                        </h4>
                        ${kp.importance_score !== null ? `
                            <span class="text-xs px-2 py-1 bg-purple-100 text-purple-700 rounded">
                                重要度: ${(kp.importance_score * 100).toFixed(0)}%
                            </span>
                        ` : ''}
                    </div>
                    ${kp.summary ? `
                        <p class="text-sm text-gray-600 mb-2">📝 ${escapeHtml(kp.summary)}</p>
                    ` : ''}
                    <p class="text-sm text-gray-700 mb-3">${escapeHtml(kp.content.substring(0, 200))}${kp.content.length > 200 ? '...' : ''}</p>
                    ${kp.tags.length > 0 ? `
                        <div class="flex flex-wrap gap-2 mb-2">
                            ${kp.tags.map(tag => `
                                <span class="text-xs px-2 py-1 bg-blue-50 text-blue-700 rounded">
                                    #${escapeHtml(tag.tag_name)}
                                </span>
                            `).join('')}
                        </div>
                    ` : ''}
                    <div class="flex items-center justify-between text-xs text-gray-500 mt-2 pt-2 border-t">
                        <span>创建时间: ${formatDateTime(kp.created_at)}</span>
                        ${kp.dify_sync_status ? `
                            <span class="px-2 py-1 rounded ${kp.dify_sync_status === 'synced' ? 'bg-green-100 text-green-700' :
                        kp.dify_sync_status === 'failed' ? 'bg-red-100 text-red-700' :
                            'bg-yellow-100 text-yellow-700'
                    }">
                                Dify: ${kp.dify_sync_status}
                            </span>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        async function reparseDocument() {
            if (!confirm('确定要重新解析该文档吗？\n\n此操作将先删除已有的知识点数据（包括 MySQL 和 Dify 知识库），然后重新解析入库。')) return;

            const btn = document.getElementById('reparseBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 清理旧数据...';

            try {
                const response = await fetch(`/api/v1/documents/${currentDocId}/reparse`, {
                    method: 'POST'
                });

                if (response.ok) {
                    const data = await response.json();
                    sessionStorage.setItem(`reparse_${currentDocId}`, '1');
                    alert(`✅ ${data.message}\n\n处理完成后页面将自动刷新`);
                    setTimeout(() => location.reload(), 1000);
                } else {
                    const data = await response.json();
                    alert('❌ 提交失败: ' + (data.detail || '未知错误'));
                    btn.disabled = false;
                    btn.textContent = '🔄 重新解析';
                }
            } catch (error) {
                alert('❌ 网络错误: ' + error.message);
                btn.disabled = false;
                btn.textContent = '🔄 重新解析';
            }
        }

        let currentDoc = null;

        function toggleEditForm() {
            const form = document.getElementById('editForm');
            const isHidden = form.classList.contains('hidden');
            if (isHidden && currentDoc) {
                document.getElementById('editDocName').value = currentDoc.doc_name || '';
                document.getElementById('editDocType').value = currentDoc.doc_type || '';
                document.getElementById('editBusinessDomain').value = currentDoc.business_domain || '';
                document.getElementById('editOrgDimension').value = currentDoc.org_dimension || '';
                document.getElementById('editVersion').value = currentDoc.version || '';
                document.getElementById('editSecurityLevel').value = currentDoc.security_level || 'internal';
            }
            form.classList.toggle('hidden');
        }

        async function submitEdit() {
            const body = {};
            const name = document.getElementById('editDocName').value.trim();
            const type = document.getElementById('editDocType').value.trim();
            const domain = document.getElementById('editBusinessDomain').value.trim();
            const org = document.getElementById('editOrgDimension').value.trim();
            const ver = document.getElementById('editVersion').value.trim();
            const sec = document.getElementById('editSecurityLevel').value;

            if (name) body.doc_name = name;
            if (type) body.doc_type = type;
            if (domain) body.business_domain = domain;
            if (org) body.org_dimension = org;
            if (ver) body.version = ver;
            if (sec) body.security_level = sec;

            if (Object.keys(body).length === 0) {
                alert('请至少填写一个字段');
                return;
            }

            try {
                const response = await fetch(`/api/v1/documents/${currentDocId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                if (response.ok) {
                    alert('✅ 文档信息已更新');
                    location.reload();
                } else {
                    const data = await response.json();
                    alert('❌ 更新失败: ' + (data.detail || '未知错误'));
                }
            } catch (error) {
                alert('❌ 网络错误: ' + error.message);
            }
        }

        async function deleteDocument() {
            if (!confirm('确定要删除该文档吗？此操作将同时删除关联的知识点和 Dify 知识库数据，不可恢复！')) return;
            if (!confirm('再次确认：删除后无法恢复，是否继续？')) return;

            const btn = document.getElementById('deleteBtn');
            btn.disabled = true;
            btn.textContent = '🗑️ 删除中...';

            try {
                const response = await fetch(`/api/v1/documents/${currentDocId}`, {
                    method: 'DELETE',
                });
                if (response.ok) {
                    const data = await response.json();
                    const d = data.detail;
                    alert(`✅ 文档已删除\n知识点: ${d.knowledge_points_deleted} 条\nDify: 成功 ${d.dify_deleted} / 失败 ${d.dify_failed}\nMinIO: ${d.minio_deleted ? '已删除' : '未删除'}`);
                    window.location.href = '/static/list.html';
                } else {
                    const data = await response.json();
                    alert('❌ 删除失败: ' + (data.detail || '未知错误'));
                    btn.disabled = false;
                    btn.textContent = '🗑️ 删除文档';
                }
            } catch (error) {
                alert('❌ 网络错误: ' + error.message);
                btn.disabled = false;
                btn.textContent = '🗑️ 删除文档';
            }
        }

        function getStatusBadge(status) {
            const badges = {
                'pending': '<span class="px-4 py-2 bg-yellow-100 text-yellow-800 rounded-full">待解析</span>',
                'parsing': '<span class="px-4 py-2 bg-blue-100 text-blue-800 rounded-full">解析中</span>',
                'completed': '<span class="px-4 py-2 bg-green-100 text-green-800 rounded-full">已完成</span>',
                'failed': '<span class="px-4 py-2 bg-red-100 text-red-800 rounded-full">失败</span>'
            };
            return badges[status] || '<span class="px-4 py-2 bg-gray-100 text-gray-800 rounded-full">未知</span>';
        }

        function formatFileSize(bytes) {
            if (!bytes) return '-';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(message) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
            document.getElementById('errorText').textContent = message;
        }

        // 页面加载时自动获取文档详情
        window.addEventListener('DOMContentLoaded', loadDocument);
    </script>
</body>

</html>
