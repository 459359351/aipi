<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签管理 - 知识处理服务</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen">
        <!-- 顶部导航 -->
        <nav class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto px-4 py-4">
                <div class="flex items-center justify-between">
                    <h1 class="text-2xl font-bold text-gray-800">AI 知识处理服务</h1>
                    <div class="space-x-4 text-sm">
                        <a href="/static/index.html" class="text-gray-600 hover:text-blue-600">首页</a>
                        <a href="/static/upload.html" class="text-gray-600 hover:text-blue-600">上传文档</a>
                        <a href="/static/list.html" class="text-gray-600 hover:text-blue-600">文档列表</a>
                        <a href="/static/generate.html" class="text-gray-600 hover:text-blue-600">AI 出题</a>
                        <a href="/static/practice.html" class="text-gray-600 hover:text-blue-600">模拟答题</a>
                        <a href="/static/recommend-admin.html" class="text-gray-600 hover:text-blue-600">题目审核</a>
                        <a href="/static/tags.html" class="text-blue-600 font-medium">标签管理</a>
                        <a href="/docs" class="text-gray-600 hover:text-blue-600">API 文档</a>
                    </div>
                </div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto px-4 py-8 space-y-6">
            <div class="bg-white rounded-lg shadow-sm p-6">
                <div class="flex items-center justify-between gap-4 flex-wrap">
                    <div>
                        <h2 class="text-xl font-bold text-gray-800">标签管理</h2>
                        <p class="text-sm text-gray-600 mt-1">维护预设标签（多类多簇），供知识点/题目打标与推荐召回使用。</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="loadAll()" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">🔄 刷新</button>
                        <button onclick="seedDomainTags()" class="px-4 py-2 bg-gray-100 text-gray-800 rounded-md hover:bg-gray-200">🌱 导入党建领域预设标签</button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- 创建/编辑 -->
                <div class="bg-white rounded-lg shadow-sm p-6">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4">新增/编辑标签</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">标签名称</label>
                            <input id="tagNameInput" type="text" placeholder="如：三会一课、党员发展流程..." class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">标签分类（tag_type）</label>
                            <select id="tagTypeSelect" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"></select>
                            <p class="text-xs text-gray-500 mt-1">建议：domain/chapter/knowledge_type/difficulty</p>
                        </div>
                        <label class="inline-flex items-center gap-2 text-sm text-gray-700">
                            <input id="tagEnabledInput" type="checkbox" class="rounded border-gray-300" checked>
                            设为可用标签（is_enabled=1）
                        </label>

                        <div class="flex gap-2">
                            <button onclick="createTag()" class="flex-1 px-4 py-2 bg-emerald-600 text-white rounded-md hover:bg-emerald-700">➕ 新增</button>
                            <button onclick="resetForm()" class="px-4 py-2 bg-gray-100 text-gray-800 rounded-md hover:bg-gray-200">清空</button>
                        </div>
                    </div>

                    <div class="mt-6 border-t pt-4">
                        <h4 class="text-sm font-semibold text-gray-700 mb-2">批量导入（JSON）</h4>
                        <textarea id="batchJson" rows="8" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 text-sm font-mono"
                            placeholder='[{"tag_name":"三会一课","tag_type":"chapter"}]'></textarea>
                        <button onclick="batchImport()" class="w-full mt-2 px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">📥 批量导入</button>
                    </div>
                </div>

                <!-- 列表 -->
                <div class="bg-white rounded-lg shadow-sm p-6 lg:col-span-2">
                    <div class="flex items-center justify-between gap-4 flex-wrap mb-4">
                        <h3 class="text-lg font-semibold text-gray-800">标签列表</h3>
                        <div class="flex gap-2 flex-wrap">
                            <select id="filterType" onchange="loadList()" class="px-3 py-2 border border-gray-300 rounded-md text-sm">
                                <option value="">全部分类</option>
                            </select>
                            <select id="filterEnabled" onchange="loadList()" class="px-3 py-2 border border-gray-300 rounded-md text-sm">
                                <option value="">全部状态</option>
                                <option value="1">仅可用</option>
                                <option value="0">仅候选/待审核</option>
                            </select>
                            <input id="keyword" type="text" placeholder="按名称搜索" onkeydown="if(event.key==='Enter'){loadList()}" class="px-3 py-2 border border-gray-300 rounded-md text-sm">
                            <button onclick="loadList()" class="px-3 py-2 bg-gray-100 rounded-md hover:bg-gray-200 text-sm">搜索</button>
                        </div>
                    </div>

                    <div id="msg" class="hidden mb-4 px-3 py-2 rounded text-sm"></div>

                    <div class="overflow-auto border rounded-lg">
                        <table class="min-w-full text-sm">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="text-left px-4 py-3 text-gray-600 font-medium">ID</th>
                                    <th class="text-left px-4 py-3 text-gray-600 font-medium">标签名称</th>
                                    <th class="text-left px-4 py-3 text-gray-600 font-medium">分类(tag_type)</th>
                                    <th class="text-left px-4 py-3 text-gray-600 font-medium">可用状态</th>
                                    <th class="text-left px-4 py-3 text-gray-600 font-medium">操作</th>
                                </tr>
                            </thead>
                            <tbody id="tbody" class="divide-y"></tbody>
                        </table>
                    </div>

                    <div class="mt-3 flex items-center justify-between text-sm text-gray-600">
                        <div id="total">共 0 个标签</div>
                        <div class="flex items-center gap-2">
                            <button onclick="prevPage()" class="px-3 py-1 bg-gray-100 rounded hover:bg-gray-200">上一页</button>
                            <span id="pageInfo">1</span>
                            <button onclick="nextPage()" class="px-3 py-1 bg-gray-100 rounded hover:bg-gray-200">下一页</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        let page = 1;
        const limit = 50;

        function showMsg(text, type='info') {
            const el = document.getElementById('msg');
            el.classList.remove('hidden');
            el.textContent = text;
            el.className = 'mb-4 px-3 py-2 rounded text-sm ' + (
                type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' :
                type === 'success' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' :
                'bg-blue-50 text-blue-700 border border-blue-200'
            );
        }

        function resetForm() {
            document.getElementById('tagNameInput').value = '';
            document.getElementById('tagTypeSelect').value = 'domain';
            document.getElementById('tagEnabledInput').checked = true;
        }

        async function loadTypes() {
            const r = await fetch(`${API_BASE}/tags/types`);
            const data = await r.json();
            const types = data.types || {};
            const typeSel = document.getElementById('tagTypeSelect');
            const filterSel = document.getElementById('filterType');
            typeSel.innerHTML = '';
            filterSel.innerHTML = '<option value="">全部分类</option>';
            for (const [k, v] of Object.entries(types)) {
                typeSel.innerHTML += `<option value="${k}">${k}（${v}）</option>`;
                filterSel.innerHTML += `<option value="${k}">${k}（${v}）</option>`;
            }
            typeSel.value = 'domain';
        }

        async function loadList() {
            const tag_type = document.getElementById('filterType').value || '';
            const is_enabled = document.getElementById('filterEnabled').value;
            const keyword = document.getElementById('keyword').value || '';
            const skip = (page - 1) * limit;
            const url = new URL(`${location.origin}${API_BASE}/tags`);
            url.searchParams.set('skip', String(skip));
            url.searchParams.set('limit', String(limit));
            if (tag_type) url.searchParams.set('tag_type', tag_type);
            if (is_enabled !== '') url.searchParams.set('is_enabled', is_enabled);
            if (keyword) url.searchParams.set('keyword', keyword);

            const r = await fetch(url.toString());
            const data = await r.json();
            const items = data.items || [];
            document.getElementById('total').textContent = `共 ${data.total ?? items.length} 个标签`;
            document.getElementById('pageInfo').textContent = String(page);

            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';
            for (const it of items) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-4 py-3 text-gray-700">${it.id}</td>
                    <td class="px-4 py-3 text-gray-900 font-medium">${escapeHtml(it.tag_name)}</td>
                    <td class="px-4 py-3 text-gray-700">${escapeHtml(it.tag_type || '')}</td>
                    <td class="px-4 py-3">${(it.is_enabled || 0) === 1 ? '<span class="text-emerald-700">可用</span>' : '<span class="text-amber-700">待审核</span>'}</td>
                    <td class="px-4 py-3">
                        <button class="text-blue-600 hover:underline mr-3" onclick="toggleEnabled(${it.id}, ${(it.is_enabled || 0) === 1 ? 0 : 1})">${(it.is_enabled || 0) === 1 ? '停用' : '启用'}</button>
                        <button class="text-red-600 hover:underline" onclick="deleteTag(${it.id})">删除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            }
        }

        function prevPage() {
            if (page > 1) { page--; loadList(); }
        }
        function nextPage() {
            page++; loadList();
        }

        async function createTag() {
            const tag_name = (document.getElementById('tagNameInput').value || '').trim();
            const tag_type = document.getElementById('tagTypeSelect').value;
            const is_enabled = document.getElementById('tagEnabledInput').checked ? 1 : 0;
            if (!tag_name) {
                showMsg('请输入标签名称', 'error');
                return;
            }
            const r = await fetch(`${API_BASE}/tags`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({tag_name, tag_type, is_enabled}),
            });
            if (!r.ok) {
                const err = await r.json().catch(()=>({detail:'未知错误'}));
                showMsg(err.detail || '创建失败', 'error');
                return;
            }
            showMsg('创建成功', 'success');
            resetForm();
            loadList();
        }

        async function deleteTag(id) {
            if (!confirm('确认删除该标签？（会同步删除题目/知识点关联）')) return;
            const r = await fetch(`${API_BASE}/tags/${id}`, {method:'DELETE'});
            if (!r.ok) {
                const err = await r.json().catch(()=>({detail:'未知错误'}));
                showMsg(err.detail || '删除失败', 'error');
                return;
            }
            showMsg(`删除成功: ${id}`, 'success');
            loadList();
        }

        async function toggleEnabled(id, enabled) {
            const r = await fetch(`${API_BASE}/tags/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({is_enabled: enabled}),
            });
            if (!r.ok) {
                const err = await r.json().catch(()=>({detail:'未知错误'}));
                showMsg(err.detail || '更新失败', 'error');
                return;
            }
            showMsg(`标签 ${id} 已${enabled === 1 ? '启用' : '停用'}`, 'success');
            loadList();
        }

        async function batchImport() {
            let payload;
            try {
                payload = JSON.parse(document.getElementById('batchJson').value || '[]');
            } catch(e) {
                showMsg('JSON 解析失败，请检查格式', 'error');
                return;
            }
            const r = await fetch(`${API_BASE}/tags/batch`, {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(payload),
            });
            const data = await r.json().catch(()=>({}));
            if (!r.ok) {
                showMsg(data.detail || '批量导入失败', 'error');
                return;
            }
            showMsg(`批量导入完成：created=${data.created}, skipped=${data.skipped}`, 'success');
            loadList();
        }

        async function seedDomainTags() {
            const preset = [
                {tag_name:'企业战略与经营管理', tag_type:'domain', is_enabled:1},
                {tag_name:'党的基本制度理论及相关要求', tag_type:'domain', is_enabled:1},
                {tag_name:'企业文化', tag_type:'domain', is_enabled:1},
                {tag_name:'组织建设', tag_type:'domain', is_enabled:1},
                {tag_name:'党员发展教育', tag_type:'domain', is_enabled:1},
                {tag_name:'党风廉政建设', tag_type:'domain', is_enabled:1},
                {tag_name:'宣传工作', tag_type:'domain', is_enabled:1},
                {tag_name:'CI工作', tag_type:'domain', is_enabled:1},
                {tag_name:'舆情工作', tag_type:'domain', is_enabled:1},
                {tag_name:'工会工作', tag_type:'domain', is_enabled:1},
                {tag_name:'共青团工作', tag_type:'domain', is_enabled:1},
            ];
            const r = await fetch(`${API_BASE}/tags/batch`, {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(preset),
            });
            const data = await r.json().catch(()=>({}));
            if (!r.ok) {
                showMsg(data.detail || '导入失败', 'error');
                return;
            }
            showMsg(`预设标签已导入：created=${data.created}, skipped=${data.skipped}`, 'success');
            loadList();
        }

        function escapeHtml(str) {
            return String(str).replaceAll('&', '&amp;')
                .replaceAll('<','&lt;').replaceAll('>','&gt;')
                .replaceAll('\"','&quot;').replaceAll(\"'\", '&#39;');
        }

        async function loadAll() {
            await loadTypes();
            await loadList();
        }

        window.addEventListener('DOMContentLoaded', loadAll);
    </script>
</body>
</html>
