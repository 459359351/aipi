<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模拟答题 - 知识处理服务</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-6xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <h1 class="text-xl font-semibold text-gray-800">AI 知识处理服务</h1>
                <div class="space-x-4 text-sm">
                    <a href="/static/index.html" class="text-gray-700 hover:text-blue-600">首页</a>
                    <a href="/static/upload.html" class="text-gray-700 hover:text-blue-600">上传文档</a>
                    <a href="/static/list.html" class="text-gray-700 hover:text-blue-600">文档列表</a>
                    <a href="/static/generate.html" class="text-gray-700 hover:text-blue-600">AI 出题</a>
                    <a href="/static/practice.html" class="text-blue-600 font-medium">模拟答题</a>
                    <a href="/static/recommend-admin.html" class="text-gray-700 hover:text-blue-600">题目审核</a>
                    <a href="/static/tags.html" class="text-gray-700 hover:text-blue-600">标签管理</a>
                    <a href="/docs" class="text-gray-700 hover:text-blue-600">API 文档</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto px-4 py-8">
        <!-- 选择文档与取题 -->
        <div id="chooseSection" class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">1. 选择文档并获取题目</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                <input id="userIdInput" type="text" placeholder="用户ID（可选，用于行为重排）"
                    class="px-3 py-2 border border-gray-300 rounded-md">
                <input id="interestsInput" type="text" placeholder="兴趣标签（逗号分隔，可选）"
                    class="px-3 py-2 border border-gray-300 rounded-md">
            </div>
            <div class="flex flex-wrap gap-4 items-end">
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-sm font-medium text-gray-700 mb-1">文档</label>
                    <select id="docSelect"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500">
                        <option value="">-- 加载中 --</option>
                    </select>
                </div>
                <button type="button" id="fetchQuestionBtn"
                    class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
                    获取一道题
                </button>
                <button type="button" id="fetchByProfileBtn"
                    class="px-4 py-2 bg-purple-600 text-white rounded-md hover:bg-purple-700">
                    按画像获取题目
                </button>
            </div>
            <p id="fetchError" class="mt-2 text-sm text-red-600 hidden"></p>
        </div>

        <!-- 当前题目展示 -->
        <div id="questionSection" class="bg-white rounded-lg shadow-md p-6 mb-6 hidden">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">2. 作答</h2>
            <div id="questionBody" class="mb-6"></div>
            <div id="answerArea" class="mb-4"></div>
            <div class="flex gap-3">
                <button type="button" id="submitAnswerBtn"
                    class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700">
                    提交答案
                </button>
                <button type="button" id="mockWrongBtn"
                    class="px-4 py-2 bg-amber-500 text-white rounded-md hover:bg-amber-600">
                    模拟答错（触发推荐）
                </button>
            </div>
            <div id="resultMessage" class="mt-4 hidden"></div>
        </div>

        <!-- 答错后：推荐练习更多 -->
        <div id="recommendSection" class="bg-white rounded-lg shadow-md p-6 hidden">
            <h2 class="text-lg font-semibold text-gray-800 mb-2">推荐练习更多（与错题相关）</h2>
            <p class="text-sm text-gray-500 mb-4">基于当前错题的知识点/同文档题目推荐</p>
            <div id="recommendLoading" class="text-gray-500 hidden">加载中...</div>
            <div id="recommendList" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        let currentQuestion = null; // { question_type, question_id, question_text, options?, correct_answer, ... }
        let currentStartAt = null;

        async function loadDocuments() {
            const sel = document.getElementById('docSelect');
            try {
                const r = await fetch(`${API_BASE}/documents?limit=100&status=completed`);
                const data = await r.json();
                sel.innerHTML = '<option value="">-- 请选择已解析完成的文档 --</option>';
                (data.items || []).forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.id;
                    opt.textContent = `[ID:${d.id}] ${d.doc_name || '未命名'}`;
                    sel.appendChild(opt);
                });
            } catch (e) {
                sel.innerHTML = '<option value="">加载失败</option>';
            }
        }

        async function fetchOneQuestion() {
            const docId = document.getElementById('docSelect').value;
            const errEl = document.getElementById('fetchError');
            errEl.classList.add('hidden');
            if (!docId) {
                errEl.textContent = '请先选择文档';
                errEl.classList.remove('hidden');
                return;
            }
            try {
                const r = await fetch(
                    `${API_BASE}/recommendations/by-document/${docId}?single_count=1&multiple_count=1&judge_count=1&essay_count=0&include_manual=true&user_id=${encodeURIComponent((document.getElementById('userIdInput').value || '').trim())}`
                );
                if (!r.ok) throw new Error(await r.text());
                const data = await r.json();
                const items = data.items || [];
                if (items.length === 0) {
                    errEl.textContent = '该文档下暂无题目，请先使用 AI 出题 生成题目';
                    errEl.classList.remove('hidden');
                    return;
                }
                currentQuestion = items[0];
                renderQuestion(currentQuestion);
                currentStartAt = Date.now();
                document.getElementById('questionSection').classList.remove('hidden');
                document.getElementById('recommendSection').classList.add('hidden');
                document.getElementById('resultMessage').classList.add('hidden');
            } catch (e) {
                errEl.textContent = e.message || '获取题目失败';
                errEl.classList.remove('hidden');
            }
        }

        async function fetchOneQuestionByProfile() {
            const userId = (document.getElementById('userIdInput').value || '').trim();
            const interestsText = (document.getElementById('interestsInput').value || '').trim();
            const errEl = document.getElementById('fetchError');
            errEl.classList.add('hidden');
            if (!userId) {
                errEl.textContent = '请先输入用户ID';
                errEl.classList.remove('hidden');
                return;
            }
            try {
                const interests = interestsText ? interestsText.split(',').map(x => x.trim()).filter(Boolean) : [];
                await fetch(`${API_BASE}/recommendations/profiles/upsert`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, interests }),
                });
                const r = await fetch(
                    `${API_BASE}/recommendations/by-profile/${encodeURIComponent(userId)}?single_count=1&multiple_count=1&judge_count=1&essay_count=0`
                );
                if (!r.ok) throw new Error(await r.text());
                const data = await r.json();
                const items = data.items || [];
                if (!items.length) {
                    errEl.textContent = '该画像下暂无可推荐题目';
                    errEl.classList.remove('hidden');
                    return;
                }
                currentQuestion = items[0];
                renderQuestion(currentQuestion);
                currentStartAt = Date.now();
                document.getElementById('questionSection').classList.remove('hidden');
                document.getElementById('recommendSection').classList.add('hidden');
                document.getElementById('resultMessage').classList.add('hidden');
            } catch (e) {
                errEl.textContent = e.message || '按画像获取题目失败';
                errEl.classList.remove('hidden');
            }
        }

        async function recordBehavior(isCorrect) {
            const userId = (document.getElementById('userIdInput').value || '').trim();
            if (!userId || !currentQuestion) return;
            const spent = currentStartAt ? Math.max(0, Math.round((Date.now() - currentStartAt) / 1000)) : 0;
            await fetch(`${API_BASE}/recommendations/behaviors/record`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: userId,
                    question_type: currentQuestion.question_type,
                    question_id: currentQuestion.question_id,
                    is_correct: isCorrect ? 1 : 0,
                    time_spent_sec: spent,
                }),
            }).catch(() => { });
        }

        function renderQuestion(q) {
            const body = document.getElementById('questionBody');
            const area = document.getElementById('answerArea');
            body.innerHTML = '';
            area.innerHTML = '';

            const typeLabel = { single: '单选题', multiple: '多选题', judge: '判断题', essay: '简答题' }[q.question_type] || q.question_type;
            body.innerHTML = `<p class="text-sm text-gray-500 mb-2">${typeLabel} · ID: ${q.question_id}</p><p class="text-gray-800">${escapeHtml(q.question_text)}</p>`;

            if (q.options) {
                const keys = Object.keys(q.options).sort();
                keys.forEach(k => {
                    const label = document.createElement('label');
                    label.className = 'flex items-center gap-2 py-2 cursor-pointer';
                    label.innerHTML = `<input type="radio" name="answer" value="${k}" class="rounded"> <span>${k}. ${escapeHtml(q.options[k] || '')}</span>`;
                    area.appendChild(label);
                });
            } else if (q.question_type === 'judge') {
                ['1', '0'].forEach(v => {
                    const label = document.createElement('label');
                    label.className = 'flex items-center gap-2 py-2 cursor-pointer';
                    label.innerHTML = `<input type="radio" name="answer" value="${v}" class="rounded"> <span>${v === '1' ? '正确' : '错误'}</span>`;
                    area.appendChild(label);
                });
            }
        }

        function escapeHtml(s) {
            if (s == null) return '';
            const div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }

        function getSelectedAnswer() {
            const radio = document.querySelector('input[name="answer"]:checked');
            return radio ? radio.value : null;
        }

        document.getElementById('submitAnswerBtn').addEventListener('click', () => {
            if (!currentQuestion) return;
            const selected = getSelectedAnswer();
            if (selected == null) {
                document.getElementById('resultMessage').textContent = '请先选择答案';
                document.getElementById('resultMessage').classList.remove('hidden');
                return;
            }
            const correct = String(currentQuestion.correct_answer).replace(/\s/g, '').split(',').includes(selected);
            const msg = document.getElementById('resultMessage');
            msg.classList.remove('hidden');
            if (correct) {
                msg.innerHTML = '<span class="text-green-600">回答正确</span>';
                recordBehavior(true);
            } else {
                msg.innerHTML = '<span class="text-red-600">回答错误。可点击下方「推荐练习更多」获取相关题目。</span>';
                recordBehavior(false);
                document.getElementById('recommendSection').classList.remove('hidden');
                loadRecommendations();
            }
        });

        document.getElementById('mockWrongBtn').addEventListener('click', () => {
            if (!currentQuestion) return;
            document.getElementById('resultMessage').innerHTML = '<span class="text-amber-600">已模拟答错，正在加载推荐题目…</span>';
            document.getElementById('resultMessage').classList.remove('hidden');
            recordBehavior(false);
            document.getElementById('recommendSection').classList.remove('hidden');
            loadRecommendations();
        });

        async function loadRecommendations() {
            if (!currentQuestion) return;
            const loading = document.getElementById('recommendLoading');
            const list = document.getElementById('recommendList');
            loading.classList.remove('hidden');
            list.innerHTML = '';
            try {
                const r = await fetch(
                    `${API_BASE}/recommendations/by-question?question_type=${currentQuestion.question_type}&question_id=${currentQuestion.question_id}&limit=10&user_id=${encodeURIComponent((document.getElementById('userIdInput').value || '').trim())}`
                );
                if (!r.ok) throw new Error(await r.text());
                const data = await r.json();
                loading.classList.add('hidden');
                const related = data.related_questions || [];
                if (related.length === 0) {
                    list.innerHTML = '<p class="text-gray-500">暂无相关推荐题目（可尝试在「题目审核」页为人工作业题目生成知识点关联）</p>';
                    return;
                }
                related.forEach((q, i) => {
                    const card = document.createElement('div');
                    card.className = 'border rounded-lg p-4 bg-gray-50';
                    const typeLabel = { single: '单选', multiple: '多选', judge: '判断', essay: '简答' }[q.question_type] || q.question_type;
                    card.innerHTML = `
                        <p class="text-sm text-gray-500 mb-1">${i + 1}. ${typeLabel} · ID: ${q.question_id} ${q.recommend_reason ? ` · ${q.recommend_reason}` : ''}</p>
                        <p class="text-gray-800">${escapeHtml(q.question_text)}</p>
                    `;
                    list.appendChild(card);
                });
            } catch (e) {
                loading.classList.add('hidden');
                list.innerHTML = '<p class="text-red-600">加载推荐失败: ' + escapeHtml(e.message) + '</p>';
            }
        }

        document.getElementById('fetchQuestionBtn').addEventListener('click', fetchOneQuestion);
        document.getElementById('fetchByProfileBtn').addEventListener('click', fetchOneQuestionByProfile);
        loadDocuments();
    </script>
</body>

</html>
