<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档列表 - 知识处理服务</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">
    <div class="min-h-screen">
        <!-- 顶部导航 -->
        <nav class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto px-4 py-4">
                <div class="flex items-center justify-between">
                    <h1 class="text-2xl font-bold text-gray-800">AI 知识处理服务</h1>
                    <div class="space-x-4 text-sm">
                        <a href="/static/index.html" class="text-gray-600 hover:text-blue-600">首页</a>
                        <a href="/static/upload.html" class="text-gray-600 hover:text-blue-600">上传文档</a>
                        <a href="/static/list.html" class="text-blue-600 font-medium">文档列表</a>
                        <a href="/static/generate.html" class="text-gray-600 hover:text-blue-600">AI 出题</a>
                        <a href="/static/practice.html" class="text-gray-600 hover:text-blue-600">模拟答题</a>
                        <a href="/static/recommend-admin.html" class="text-gray-600 hover:text-blue-600">推荐管理</a>
                        <a href="/static/tags.html" class="text-gray-600 hover:text-blue-600">标签管理</a>
                        <a href="/docs" class="text-gray-600 hover:text-blue-600">API 文档</a>
                    </div>
                </div>
            </div>
        </nav>

        <!-- 主内容区 -->
        <div class="max-w-7xl mx-auto px-4 py-8">
            <!-- 工具栏 -->
            <div class="bg-white rounded-lg shadow-sm p-4 mb-6 flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <button onclick="loadDocuments()"
                        class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
                        🔄 刷新
                    </button>
                    <span id="totalCount" class="text-sm text-gray-600">共 0 个文档</span>
                </div>
                <div class="flex items-center space-x-2">
                    <label class="text-sm text-gray-600">状态筛选:</label>
                    <select id="statusFilter" onchange="filterByStatus()"
                        class="px-3 py-1 border border-gray-300 rounded-md text-sm">
                        <option value="">全部</option>
                        <option value="pending">待解析</option>
                        <option value="parsing">解析中</option>
                        <option value="completed">已完成</option>
                        <option value="failed">失败</option>
                    </select>
                </div>
            </div>

            <!-- 加载提示 -->
            <div id="loading" class="bg-white rounded-lg shadow-sm p-8 text-center hidden">
                <div
                    class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent">
                </div>
                <p class="mt-2 text-gray-600">加载中...</p>
            </div>

            <!-- 文档列表 -->
            <div id="documentList" class="space-y-4">
                <!-- 动态加载 -->
            </div>

            <!-- 空状态 -->
            <div id="emptyState" class="bg-white rounded-lg shadow-sm p-12 text-center hidden">
                <p class="text-gray-500 text-lg">暂无文档</p>
                <a href="/static/upload.html"
                    class="mt-4 inline-block px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
                    上传第一个文档
                </a>
            </div>
        </div>
    </div>

    <script>
        let allDocuments = [];

        async function loadDocuments() {
            const loading = document.getElementById('loading');
            const documentList = document.getElementById('documentList');
            const emptyState = document.getElementById('emptyState');

            loading.classList.remove('hidden');
            documentList.innerHTML = '';
            emptyState.classList.add('hidden');

            try {
                allDocuments = await fetchAllDocuments();
                displayDocuments(allDocuments);
            } catch (error) {
                documentList.innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-lg p-4 text-red-800">
                        ❌ 加载失败: ${error.message}
                    </div>
                `;
            } finally {
                loading.classList.add('hidden');
            }
        }

        async function fetchAllDocuments() {
            const response = await fetch('/api/v1/documents?limit=200');
            if (!response.ok) throw new Error(`获取文档列表失败 (${response.status})`);
            const data = await response.json();
            return data.items;
        }

        function displayDocuments(documents) {
            const documentList = document.getElementById('documentList');
            const emptyState = document.getElementById('emptyState');
            const totalCount = document.getElementById('totalCount');

            totalCount.textContent = `共 ${documents.length} 个文档`;

            if (documents.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }

            documentList.innerHTML = documents.map(doc => `
                <div class="bg-white rounded-lg shadow-sm hover:shadow-md transition-shadow">
                    <div class="p-6 cursor-pointer" onclick="viewDocument(${doc.id})">
                        <div class="flex items-start justify-between">
                            <div class="flex-1">
                                <h3 class="text-lg font-semibold text-gray-800 mb-2">${escapeHtml(doc.doc_name)}</h3>
                                <div class="grid grid-cols-2 gap-4 text-sm text-gray-600">
                                    <div><span class="font-medium">一级标签:</span> ${doc.doc_type || '-'}</div>
                                    <div><span class="font-medium">二级标签:</span> ${doc.business_domain || '-'}</div>
                                    <div><span class="font-medium">组织维度:</span> ${doc.org_dimension || '-'}</div>
                                    <div><span class="font-medium">版本:</span> ${doc.version || '-'}</div>
                                    <div><span class="font-medium">文件大小:</span> ${formatFileSize(doc.file_size)}</div>
                                    <div><span class="font-medium">格式:</span> ${doc.file_format?.toUpperCase() || '-'}</div>
                                </div>
                            </div>
                            <div class="ml-4 flex flex-col items-end space-y-2">
                                ${getStatusBadge(doc.status)}
                                <span class="text-xs text-gray-500">${formatDateTime(doc.created_at)}</span>
                            </div>
                        </div>
                        ${doc.error_message ? `
                            <div class="mt-3 p-2 bg-red-50 border border-red-200 rounded text-sm text-red-700">
                                ⚠️ ${escapeHtml(doc.error_message)}
                            </div>
                        ` : ''}
                    </div>
                    <div class="px-6 pb-4 flex justify-end border-t pt-3">
                        <button onclick="event.stopPropagation(); deleteDoc(${doc.id}, '${escapeHtml(doc.doc_name)}')"
                            class="px-3 py-1 text-xs text-red-600 hover:bg-red-50 border border-red-200 rounded-md transition-colors">
                            🗑️ 删除
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function getStatusBadge(status) {
            const badges = {
                'pending': '<span class="px-3 py-1 bg-yellow-100 text-yellow-800 text-sm rounded-full">待解析</span>',
                'parsing': '<span class="px-3 py-1 bg-blue-100 text-blue-800 text-sm rounded-full">解析中</span>',
                'completed': '<span class="px-3 py-1 bg-green-100 text-green-800 text-sm rounded-full">已完成</span>',
                'failed': '<span class="px-3 py-1 bg-red-100 text-red-800 text-sm rounded-full">失败</span>'
            };
            return badges[status] || '<span class="px-3 py-1 bg-gray-100 text-gray-800 text-sm rounded-full">未知</span>';
        }

        function formatFileSize(bytes) {
            if (!bytes) return '-';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function filterByStatus() {
            const status = document.getElementById('statusFilter').value;
            const filtered = status ? allDocuments.filter(doc => doc.status === status) : allDocuments;
            displayDocuments(filtered);
        }

        async function deleteDoc(id, name) {
            if (!confirm(`确定要删除文档「${name}」吗？\n此操作将同时删除关联的知识点和 Dify 数据，不可恢复！`)) return;

            try {
                const response = await fetch(`/api/v1/documents/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    alert('✅ 文档已删除');
                    loadDocuments();
                } else {
                    const data = await response.json();
                    alert('❌ 删除失败: ' + (data.detail || '未知错误'));
                }
            } catch (error) {
                alert('❌ 网络错误: ' + error.message);
            }
        }

        function viewDocument(id) {
            window.location.href = `/static/detail.html?id=${id}`;
        }

        // 页面加载时自动获取文档列表
        window.addEventListener('DOMContentLoaded', loadDocuments);
    </script>
</body>

</html>
